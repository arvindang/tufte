name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      # Install the whole workspace so @tufte/chart-core links into app.
      # Use `npm install` (not `npm ci`): npm doesn't lock rolldown's optional
      # platform binary (vite 8's bundler) for non-host platforms, so `npm ci`
      # can't install the Linux binding on the runner. `npm install` resolves the
      # per-platform binary from the registry. (esbuild locks all platforms, so
      # the Obsidian release workflow can keep using `npm ci`.)
      - run: npm install --no-audit --no-fund
      - run: npm run build -w app
      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
